version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_crm
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on: [db]
    ports: ["5000:5000"]
    command: sh -c "npm run migrate && npm run seed && npm start"

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["5173:5173"]
volumes:
  pgdata:
